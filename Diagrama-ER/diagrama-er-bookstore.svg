<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Styles -->
  <style>
    .entity-header { fill: #1e3a5f; }
    .entity-bg { fill: #f0f4f8; stroke: #1e3a5f; stroke-width: 2; }
    .field-bg-odd { fill: #ffffff; }
    .field-bg-even { fill: #e8f0f8; }
    .title { font-family: Arial; font-size: 13px; font-weight: bold; fill: #ffffff; }
    .field { font-family: Arial; font-size: 11px; fill: #1e3a5f; }
    .pk { font-family: Arial; font-size: 11px; fill: #c0392b; font-weight: bold; }
    .fk { font-family: Arial; font-size: 11px; fill: #27ae60; font-style: italic; }
    .rel-line { stroke: #555; stroke-width: 1.5; fill: none; }
    .rel-label { font-family: Arial; font-size: 10px; fill: #555; }
  </style>

  <!-- USER Entity -->
  <g transform="translate(30, 80)">
    <rect class="entity-bg" x="0" y="0" width="160" height="150" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="160" height="28" rx="6"/>
    <rect x="0" y="18" width="160" height="10" fill="#1e3a5f"/>
    <text class="title" x="80" y="19" text-anchor="middle">USER</text>
    <rect class="field-bg-odd" x="1" y="28" width="158" height="20"/>
    <text class="pk" x="8" y="42">PK  id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="158" height="20"/>
    <text class="field" x="8" y="62">name : String</text>
    <rect class="field-bg-odd" x="1" y="68" width="158" height="20"/>
    <text class="field" x="8" y="82">email : String</text>
    <rect class="field-bg-even" x="1" y="88" width="158" height="20"/>
    <text class="field" x="8" y="102">password : String</text>
    <rect class="field-bg-odd" x="1" y="108" width="158" height="20"/>
    <text class="field" x="8" y="122">role : Enum</text>
    <rect x="1" y="128" width="158" height="21" fill="#f0f4f8" rx="0"/>
  </g>

  <!-- AUTHOR Entity -->
  <g transform="translate(30, 300)">
    <rect class="entity-bg" x="0" y="0" width="160" height="130" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="160" height="28" rx="6"/>
    <rect x="0" y="18" width="160" height="10" fill="#1e3a5f"/>
    <text class="title" x="80" y="19" text-anchor="middle">AUTHOR</text>
    <rect class="field-bg-odd" x="1" y="28" width="158" height="20"/>
    <text class="pk" x="8" y="42">PK  id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="158" height="20"/>
    <text class="field" x="8" y="62">name : String</text>
    <rect class="field-bg-odd" x="1" y="68" width="158" height="20"/>
    <text class="field" x="8" y="82">biography : Text</text>
    <rect class="field-bg-even" x="1" y="88" width="158" height="20"/>
    <text class="field" x="8" y="102">email : String</text>
    <rect x="1" y="108" width="158" height="21" fill="#f0f4f8"/>
  </g>

  <!-- BOOK Entity -->
  <g transform="translate(280, 180)">
    <rect class="entity-bg" x="0" y="0" width="175" height="190" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="175" height="28" rx="6"/>
    <rect x="0" y="18" width="175" height="10" fill="#1e3a5f"/>
    <text class="title" x="87" y="19" text-anchor="middle">BOOK</text>
    <rect class="field-bg-odd" x="1" y="28" width="173" height="20"/>
    <text class="pk" x="8" y="42">PK  id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="173" height="20"/>
    <text class="field" x="8" y="62">title : String</text>
    <rect class="field-bg-odd" x="1" y="68" width="173" height="20"/>
    <text class="field" x="8" y="82">isbn : String</text>
    <rect class="field-bg-even" x="1" y="88" width="173" height="20"/>
    <text class="field" x="8" y="102">price : Decimal</text>
    <rect class="field-bg-odd" x="1" y="108" width="173" height="20"/>
    <text class="field" x="8" y="122">stock : Integer</text>
    <rect class="field-bg-even" x="1" y="128" width="173" height="20"/>
    <text class="field" x="8" y="142">description : String</text>
    <rect class="field-bg-odd" x="1" y="148" width="173" height="20"/>
    <text class="fk" x="8" y="162">FK  author_id : Long</text>
    <rect x="1" y="168" width="173" height="21" fill="#f0f4f8"/>
  </g>

  <!-- CATEGORY Entity -->
  <g transform="translate(280, 430)">
    <rect class="entity-bg" x="0" y="0" width="175" height="110" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="175" height="28" rx="6"/>
    <rect x="0" y="18" width="175" height="10" fill="#1e3a5f"/>
    <text class="title" x="87" y="19" text-anchor="middle">CATEGORY</text>
    <rect class="field-bg-odd" x="1" y="28" width="173" height="20"/>
    <text class="pk" x="8" y="42">PK  id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="173" height="20"/>
    <text class="field" x="8" y="62">name : String</text>
    <rect class="field-bg-odd" x="1" y="68" width="173" height="20"/>
    <text class="field" x="8" y="82">description : String</text>
    <rect x="1" y="88" width="173" height="21" fill="#f0f4f8"/>
  </g>

  <!-- BOOK_CATEGORIES Entity -->
  <g transform="translate(280, 620)">
    <rect class="entity-bg" x="0" y="0" width="175" height="90" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="175" height="28" rx="6"/>
    <rect x="0" y="18" width="175" height="10" fill="#1e3a5f"/>
    <text class="title" x="87" y="19" text-anchor="middle">BOOK_CATEGORIES</text>
    <rect class="field-bg-odd" x="1" y="28" width="173" height="20"/>
    <text class="fk" x="8" y="42">FK  book_id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="173" height="20"/>
    <text class="fk" x="8" y="62">FK  category_id : Long</text>
    <rect x="1" y="68" width="173" height="21" fill="#f0f4f8"/>
  </g>

  <!-- ORDER Entity -->
  <g transform="translate(580, 80)">
    <rect class="entity-bg" x="0" y="0" width="175" height="150" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="175" height="28" rx="6"/>
    <rect x="0" y="18" width="175" height="10" fill="#1e3a5f"/>
    <text class="title" x="87" y="19" text-anchor="middle">ORDER</text>
    <rect class="field-bg-odd" x="1" y="28" width="173" height="20"/>
    <text class="pk" x="8" y="42">PK  id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="173" height="20"/>
    <text class="fk" x="8" y="62">FK  user_id : Long</text>
    <rect class="field-bg-odd" x="1" y="68" width="173" height="20"/>
    <text class="field" x="8" y="82">status : Enum</text>
    <rect class="field-bg-even" x="1" y="88" width="173" height="20"/>
    <text class="field" x="8" y="102">total : Decimal</text>
    <rect class="field-bg-odd" x="1" y="108" width="173" height="20"/>
    <text class="field" x="8" y="122">created_at : DateTime</text>
    <rect x="1" y="128" width="173" height="21" fill="#f0f4f8"/>
  </g>

  <!-- ORDER_ITEM Entity -->
  <g transform="translate(580, 310)">
    <rect class="entity-bg" x="0" y="0" width="175" height="150" rx="6"/>
    <rect class="entity-header" x="0" y="0" width="175" height="28" rx="6"/>
    <rect x="0" y="18" width="175" height="10" fill="#1e3a5f"/>
    <text class="title" x="87" y="19" text-anchor="middle">ORDER_ITEM</text>
    <rect class="field-bg-odd" x="1" y="28" width="173" height="20"/>
    <text class="pk" x="8" y="42">PK  id : Long</text>
    <rect class="field-bg-even" x="1" y="48" width="173" height="20"/>
    <text class="fk" x="8" y="62">FK  order_id : Long</text>
    <rect class="field-bg-odd" x="1" y="68" width="173" height="20"/>
    <text class="fk" x="8" y="82">FK  book_id : Long</text>
    <rect class="field-bg-even" x="1" y="88" width="173" height="20"/>
    <text class="field" x="8" y="102">quantity : Integer</text>
    <rect class="field-bg-odd" x="1" y="108" width="173" height="20"/>
    <text class="field" x="8" y="122">subtotal : Decimal</text>
    <rect x="1" y="128" width="173" height="21" fill="#f0f4f8"/>
  </g>

  <!-- Relationships -->
  <!-- USER -> ORDER (1 to many) -->
  <line class="rel-line" x1="190" y1="135" x2="580" y2="135"/>
  <text class="rel-label" x="350" y="128">1</text>
  <text class="rel-label" x="560" y="128">N</text>
  <text class="rel-label" x="340" y="148">realiza</text>

  <!-- AUTHOR -> BOOK (1 to many) -->
  <line class="rel-line" x1="190" y1="355" x2="280" y2="280"/>
  <text class="rel-label" x="195" y="348">1</text>
  <text class="rel-label" x="268" y="275">N</text>
  <text class="rel-label" x="205" y="318">escribe</text>

  <!-- ORDER -> ORDER_ITEM (1 to many) -->
  <line class="rel-line" x1="667" y1="230" x2="667" y2="310"/>
  <text class="rel-label" x="672" y="248">1</text>
  <text class="rel-label" x="672" y="305">N</text>
  <text class="rel-label" x="680" y="275">contiene</text>

  <!-- BOOK -> ORDER_ITEM (1 to many) -->
  <line class="rel-line" x1="455" y1="275" x2="580" y2="385"/>
  <text class="rel-label" x="458" y="270">1</text>
  <text class="rel-label" x="572" y="380">N</text>
  <text class="rel-label" x="490" y="320">referencia</text>

  <!-- BOOK -> BOOK_CATEGORIES -->
  <line class="rel-line" x1="367" y1="370" x2="367" y2="620"/>
  <text class="rel-label" x="372" y="390">1</text>
  <text class="rel-label" x="372" y="615">N</text>

  <!-- CATEGORY -> BOOK_CATEGORIES -->
  <line class="rel-line" x1="367" y1="540" x2="367" y2="620"/>
  <text class="rel-label" x="372" y="558">1</text>
  <text class="rel-label" x="372" y="614">N</text>
  <text class="rel-label" x="385" y="590">clasifica</text>

  <!-- Legend -->
  <g transform="translate(820, 80)">
    <rect x="0" y="0" width="320" height="130" rx="8" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e3a5f">Leyenda</text>
    <rect x="15" y="35" width="12" height="12" fill="#1e3a5f"/>
    <text x="35" y="46" font-family="Arial" font-size="11" fill="#333">Entidad</text>
    <text x="15" y="68" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold">PK</text>
    <text x="35" y="68" font-family="Arial" font-size="11" fill="#333">Primary Key</text>
    <text x="15" y="88" font-family="Arial" font-size="11" fill="#27ae60" font-style="italic">FK</text>
    <text x="35" y="88" font-family="Arial" font-size="11" fill="#333">Foreign Key</text>
    <line x1="15" y1="103" x2="55" y2="103" stroke="#555" stroke-width="1.5"/>
    <text x="65" y="107" font-family="Arial" font-size="11" fill="#333">Relación entre entidades</text>
    <text x="15" y="122" font-family="Arial" font-size="11" fill="#555">1 / N = Cardinalidad</text>
  </g>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1e3a5f">Diagrama ER — bookstore-api</text>
</svg>
